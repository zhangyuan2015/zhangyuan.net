# 当前阶段：仅构建并推送到阿里云 ACR。前后端共用同一镜像仓库 zhangyuan.net，用 b_ / f_ 前缀区分 tag。
name: Build And Push To ACR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  # 命名空间固定，与 ACR 控制台一致
  ACR_NAMESPACE: yvan-2000
  # 与 ACR 中创建的仓库名一致（一个仓库里存后端、前端两套 tag）
  ACR_REPOSITORY: zhangyuan.net

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        run: |
          IMAGE=${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}
          docker build \
            -f backend/Dockerfile \
            -t ${IMAGE}:b_${{ github.sha }} \
            -t ${IMAGE}:b_latest \
            ./backend
          docker push ${IMAGE}:b_${{ github.sha }}
          docker push ${IMAGE}:b_latest

      - name: Build and push frontend image
        run: |
          IMAGE=${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}
          docker build \
            -f frontend/Dockerfile \
            -t ${IMAGE}:f_${{ github.sha }} \
            -t ${IMAGE}:f_latest \
            ./frontend
          docker push ${IMAGE}:f_${{ github.sha }}
          docker push ${IMAGE}:f_latest
