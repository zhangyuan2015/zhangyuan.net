# 构建并推送 ACR → SSH 登录 ECS 执行部署（先后端再前端）。
name: Build Push ACR And Deploy ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_NAMESPACE: yvan-2000
  ACR_REPOSITORY: zhangyuan.net

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize ACR registry host
        run: |
          R="${{ secrets.ACR_REGISTRY }}"
          R="${R#http://}"
          R="${R#https://}"
          R="${R%/}"
          echo "ACR_REGISTRY=$R" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        run: |
          IMAGE=${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}
          docker build \
            -f backend/Dockerfile \
            -t ${IMAGE}:b_${{ github.sha }} \
            -t ${IMAGE}:b_latest \
            ./backend
          docker push ${IMAGE}:b_${{ github.sha }}
          docker push ${IMAGE}:b_latest

      - name: Build and push frontend image
        run: |
          IMAGE=${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}
          docker build \
            -f frontend/Dockerfile \
            -t ${IMAGE}:f_${{ github.sha }} \
            -t ${IMAGE}:f_latest \
            ./frontend
          docker push ${IMAGE}:f_${{ github.sha }}
          docker push ${IMAGE}:f_latest

  deploy:
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Normalize ACR registry host
        run: |
          R="${{ secrets.ACR_REGISTRY }}"
          R="${R#http://}"
          R="${R#https://}"
          R="${R%/}"
          echo "ACR_REGISTRY=$R" >> $GITHUB_ENV

      - name: Deploy on ECS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          ACR_REGISTRY: ${{ env.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER || 'docker-deploy' }}
          password: ${{ secrets.ECS_SSH_PASSWORD }}
          port: ${{ secrets.ECS_PORT || '22' }}
          envs: ACR_REGISTRY,ACR_USERNAME,ACR_PASSWORD
          script: |
            set -euo pipefail
            # 镜像变量写在部署用户家目录：/home/zhangyuan.net 常为 0750 且无组写权限，无法在该目录创建/截断 .env.images
            ENV_IMAGES="${HOME}/.zhangyuan.env.images"
            umask 077
            : > "${ENV_IMAGES}"
            echo "BACKEND_IMAGE=${{ env.ACR_REGISTRY }}/yvan-2000/zhangyuan.net:b_${{ github.sha }}" >> "${ENV_IMAGES}"
            echo "FRONTEND_IMAGE=${{ env.ACR_REGISTRY }}/yvan-2000/zhangyuan.net:f_${{ github.sha }}" >> "${ENV_IMAGES}"
            export ENV_IMAGES
            export ACR_REGISTRY ACR_USERNAME ACR_PASSWORD
            # 脚本放在部署用户家目录（如 /home/docker-deploy）；用 bash 执行以免未 chmod +x
            bash "${HOME}/deploy.sh"
